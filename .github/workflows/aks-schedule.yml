name: AKS Stop/Start Schedule

# ADR-012 / C10: AKS clusters stopped at 22:00 KST (13:00 UTC), started at 09:00 KST (00:00 UTC)
# 비용 절감용 야간 자동 중지/시작 — 평일 기준
#
# 필수 GitHub Secrets:
#   AZURE_CLIENT_ID       : Workload Identity (OIDC) 또는 Service Principal Client ID
#   AZURE_TENANT_ID       : Azure AD Tenant ID
#   AZURE_SUBSCRIPTION_ID : Azure Subscription ID
#
# Azure 인증: OIDC Federated Credential (권장) 또는 AZURE_CLIENT_SECRET
# OIDC 설정:
#   az ad app federated-credential create \
#     --id <app-id> \
#     --parameters '{"name":"gh-aks-schedule","issuer":"https://token.actions.githubusercontent.com",
#       "subject":"repo:<org>/<repo>:ref:refs/heads/main","audiences":["api://AzureADTokenExchange"]}'

on:
  schedule:
    # 22:00 KST = 13:00 UTC — STOP (월~금)
    - cron: '0 13 * * 1-5'
    # 09:00 KST = 00:00 UTC — START (월~금)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'stop 또는 start'
        required: true
        type: choice
        options:
          - stop
          - start
      prefix:
        description: '리소스 네이밍 prefix (기본: k8s)'
        required: false
        default: 'k8s'

permissions:
  id-token: write  # OIDC 토큰 발급
  contents: read

jobs:
  aks-schedule:
    name: AKS ${{ github.event.inputs.action || (github.event.schedule == '0 13 * * 1-5' && 'stop' || 'start') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PREFIX: ${{ github.event.inputs.prefix || 'k8s' }}

    steps:
      - name: Determine action
        id: action
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 13 * * 1-5" ]]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "action=start" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: AKS ${{ steps.action.outputs.action }} — mgmt
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          RG="rg-${PREFIX}-mgmt"
          NAME="aks-mgmt"
          echo "[aks-schedule] ${ACTION} ${NAME} in ${RG}"
          az aks ${ACTION} --name "${NAME}" --resource-group "${RG}" --no-wait
        env:
          PREFIX: ${{ env.PREFIX }}

      - name: AKS ${{ steps.action.outputs.action }} — app1
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          RG="rg-${PREFIX}-app1"
          NAME="aks-app1"
          echo "[aks-schedule] ${ACTION} ${NAME} in ${RG}"
          az aks ${ACTION} --name "${NAME}" --resource-group "${RG}" --no-wait
        env:
          PREFIX: ${{ env.PREFIX }}

      - name: AKS ${{ steps.action.outputs.action }} — app2
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          RG="rg-${PREFIX}-app2"
          NAME="aks-app2"
          echo "[aks-schedule] ${ACTION} ${NAME} in ${RG}"
          az aks ${ACTION} --name "${NAME}" --resource-group "${RG}" --no-wait
        env:
          PREFIX: ${{ env.PREFIX }}

      - name: Wait and verify
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          PREFIX="${{ env.PREFIX }}"
          EXPECTED_STATE=$([[ "${ACTION}" == "stop" ]] && echo "Stopped" || echo "Running")
          echo "[aks-schedule] 완료 대기 중 (예상 상태: ${EXPECTED_STATE})"

          for cluster in mgmt app1 app2; do
            RG="rg-${PREFIX}-${cluster}"
            NAME="aks-${cluster}"
            echo -n "  ${NAME}: "
            for i in $(seq 1 20); do
              STATE=$(az aks show --name "${NAME}" --resource-group "${RG}" \
                --query "powerState.code" -o tsv 2>/dev/null || echo "Unknown")
              if [[ "${STATE}" == "${EXPECTED_STATE}" ]]; then
                echo "${STATE} ✓"
                break
              fi
              if [[ "${i}" -eq 20 ]]; then
                echo "${STATE} (타임아웃 — 수동 확인 필요)"
              fi
              sleep 30
            done
          done
